

version: "3.9"

services:

  # ── Ingestion service ───────────────────────────────────────────────────────
  ingestion:
    build: .

    # Image name 
    image: malaria-ingestion:latest

    
    env_file:
      - .env

  
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    restart: "no"